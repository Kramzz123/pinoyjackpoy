<!DOCTYPE html>
<html>
<body>
    <h2 id="status">Connecting...</h2>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        const config = {
            apiKey: "AIzaSyBpU119Hs4XUySvkwhD0bs0IgPvC2Z5P3c",
            projectId: "pinoyjackpot-3bb5f"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        
        // Testing if we can reach the database
        db.collection("test").doc("ping").set({ status: "online" })
            .then(() => document.getElementById("status").innerText = "Success! Database is connected.")
            .catch((err) => document.getElementById("status").innerText = "Error: " + err.message);
    </script>
</body>
</html>
