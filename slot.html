<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Ace - JILI Gaming</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    body {
        background: #0d0202;
        background: linear-gradient(180deg, #2b0404 0%, #080000 100%);
        font-family: 'Arial Black', sans-serif;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        user-select: none;
    }
    header {
        width: 100%;
        padding: 12px 20px;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #ffd700;
    }
    .logo-text {
        color: #ffd700;
        font-weight: bold;
        font-size: 20px;
        text-shadow: 0 0 10px gold;
    }
    .exit-btn {
        color: #fff;
        text-decoration: none;
        font-size: 13px;
        background: rgba(255,255,255,0.1);
        padding: 6px 12px;
        border-radius: 4px;
        font-family: Arial, sans-serif;
    }
    .game-container {
        width: 100%;
        max-width: 430px;
        padding: 15px 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-grow: 1;
        justify-content: center;
    }
    .mode-banner {
        color: #ffd700;
        font-size: 18px;
        margin-bottom: 8px;
        letter-spacing: 2px;
        text-shadow: 0 0 8px rgba(255,215,0,0.4);
    }
    /* Real JILI Multiplier Board Layout */
    .multiplier-bar {
        background: #000;
        border: 2px solid #ffd700;
        border-radius: 25px;
        display: flex;
        width: 100%;
        justify-content: space-around;
        padding: 6px 10px;
        margin-bottom: 12px;
        box-shadow: inset 0 0 15px rgba(255,0,0,0.5);
    }
    .mult-item {
        font-size: 20px;
        font-weight: 900;
        color: #444;
        transition: all 0.2s ease;
        padding: 2px 10px;
    }
    .mult-item.active {
        color: #fff;
        background: linear-gradient(180deg, #ffae00 0%, #ff3300 100%);
        border-radius: 15px;
        box-shadow: 0 0 12px #ff6600;
        transform: scale(1.15);
    }
    /* 5x4 Grid Board Setup */
    .slot-machine-board {
        width: 100%;
        background: #111622;
        border: 4px solid #b8860b;
        border-radius: 12px;
        padding: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.9);
    }
    .grid-5x4 {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
    }
    .card-slot {
        height: 80px;
        background: #ffffff;
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 26px;
        font-weight: bold;
        color: #000;
        box-shadow: inset 0 -4px 0 #bbb, 0 4px 6px rgba(0,0,0,0.3);
        position: relative;
        transition: transform 0.15s ease;
    }
    .card-slot.red-suit { color: #cc0000; }
    .card-slot.black-suit { color: #111; }
    
    /* Golden Card State */
    .card-slot.golden {
        background: linear-gradient(135deg, #fff6b3 0%, #ca971f 100%);
        border: 2px solid #ffd700;
        box-shadow: 0 0 10px #ffd700;
        color: #fff !important;
        text-shadow: 1px 1px 3px #000;
    }
    /* Joker Wild State */
    .card-slot.joker {
        background: linear-gradient(135deg, #bd5eff 0%, #4f0999 100%);
        border: 2px solid #df80ff;
        color: #ffd700 !important;
        font-size: 14px;
        text-shadow: 0 0 6px #fff;
        box-shadow: 0 0 12px #bd5eff;
    }
    /* Gold Scatter Coin */
    .card-slot.scatter {
        background: radial-gradient(circle, #fffb93 0%, #df5200 100%);
        border: 2px solid gold;
        border-radius: 50%;
        color: #fff !important;
        font-size: 11px;
        text-shadow: 1px 1px 2px #000;
        text-align: center;
        line-height: 1.1;
        box-shadow: 0 0 10px #df5200;
    }
    /* Control Panel UI Layout */
    .control-dashboard {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 15px;
        background: rgba(0,0,0,0.8);
        padding: 10px 20px;
        border-radius: 40px;
        border: 2px solid #b8860b;
    }
    .info-panel {
        display: flex;
        flex-direction: column;
    }
    .info-panel label {
        font-size: 10px;
        color: #888;
        text-transform: uppercase;
        font-family: Arial, sans-serif;
    }
    .info-panel span {
        font-size: 18px;
        color: gold;
        font-weight: bold;
    }
    .jili-spin-btn {
        width: 68px;
        height: 68px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ffe680 0%, #b37700 100%);
        border: 3px solid #fff;
        color: #000;
        font-weight: 900;
        font-size: 15px;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(255,215,0,0.5);
    }
    .jili-spin-btn:disabled {
        background: #333;
        color: #666;
        border-color: #555;
        box-shadow: none;
    }
    .win-ticker {
        margin-top: 12px;
        font-size: 16px;
        color: #00ff00;
        font-weight: bold;
        min-height: 20px;
        text-shadow: 0 0 10px rgba(0,255,0,0.4);
    }
</style>
</head>
<body>

<header>
    <div class="logo-text">PinoyJackpot</div>
    <a href="index.html" class="exit-btn">🏠 Exit</a>
</header>

<div class="game-container">
    <div class="mode-banner" id="game-mode">MAIN GAME</div>

    <!-- Multiplier Dashboard -->
    <div class="multiplier-bar">
        <div class="mult-item active" id="x_0">x1</div>
        <div class="mult-item" id="x_1">x2</div>
        <div class="mult-item" id="x_2">x3</div>
        <div class="mult-item" id="x_3">x5</div>
    </div>

    <!-- 5x4 Main Card Board -->
    <div class="slot-machine-board">
        <div class="grid-5x4" id="board-matrix">
            <!-- Programmatically spawned dynamic grid layout elements -->
        </div>
    </div>

    <div class="win-ticker" id="win-status"></div>

    <!-- System Dashboard Interface Controls -->
    <div class="control-dashboard">
        <div class="info-panel">
            <label>Bet Setup</label>
            <span>500</span>
        </div>
        
        <button class="jili-spin-btn" id="spin-btn" onclick="triggerMainSpin()">JILI</button>
        
        <div class="info-panel" style="text-align: right;">
            <label>Balance Credits</label>
            <span id="balance-display">21115</span>
        </div>
    </div>
</div>

<script>
    // Symbols available inside the engine
    const symbols = ['J', 'Q', 'K', 'A', '♠️', '♥️', '♦️', '♣️'];
    let balance = 21115;
    const betCost = 500;
    
    let isFreeSpin = false;
    let freeSpinsRemaining = 0;
    let comboMultiplierStep = 0;
    
    const normalMultiplierMap = [1, 2, 3, 5];
    const freeMultiplierMap = [2, 4, 6, 10];
    
    // 5 Columns x 4 Rows = 20 total slots index structured mapping
    let boardGridArray = Array(20).fill(null).map(() => ({ text: 'A', isGold: false, isJoker: false, isScatter: false }));

    function createEmptySlots() {
        const board = document.getElementById('board-matrix');
        board.innerHTML = '';
        for(let i=0; i<20; i++) {
            const slot = document.createElement('div');
            slot.className = 'card-slot black-suit';
            slot.id = `tile_${i}`;
            slot.innerText = 'A';
            board.appendChild(slot);
        }
    }
    createEmptySlots();

    function updateMultiplierDisplay() {
        const referenceScale = isFreeSpin ? freeMultiplierMap : normalMultiplierMap;
        for(let i=0; i<4; i++) {
            const el = document.getElementById(`x_${i}`);
            el.innerText = 'x' + referenceScale[i];
            el.className = (comboMultiplierStep === i) ? 'mult-item active' : 'mult-item';
        }
    }

    function triggerMainSpin() {
        if(!isFreeSpin && comboMultiplierStep === 0) {
            if(balance < betCost) { alert("Insufficient Credits!"); return; }
            balance -= betCost;
            document.getElementById('balance-display').innerText = balance;
        }
        document.getElementById('spin-btn').disabled = true;
        updateMultiplierDisplay();
        runShuffleAnimation();
    }

    function runShuffleAnimation() {
        let shuffles = 0;
        const speedLoop = setInterval(() => {
            for(let i=0; i<20; i++) {
                // Cascading safety drop: don't overwrite persistent grid wildcards mid combo
                if(boardGridArray[i]?.isJoker) continue;

                const tempSym = symbols[Math.floor(Math.random() * symbols.length)];
                const el = document.getElementById(`tile_${i}`);
                el.className = 'card-slot';
                el.innerText = tempSym;
                if(tempSym === '♥️' || tempSym === '♦️') el.classList.add('red-suit');
            }
            shuffles++;
            if(shuffles > 10) {
                clearInterval(speedLoop);
                processWaysToWinLogic();
            }
        }, 65);
    }

    function processWaysToWinLogic() {
        let scatterCounter = 0;

        // Populate new random arrays if it's a completely fresh base bet spin
        for(let i=0; i<20; i++) {
            if(comboMultiplierStep === 0 && !isFreeSpin) {
                let sym = symbols[Math.floor(Math.random() * symbols.length)];
                let isScat = Math.random() < 0.05; // 5% Scatter density chance
                let isG = !isScat && Math.random() < 0.25 && ['J','Q','K','A'].includes(sym); // 25% Border chance

                if(isScat) scatterCounter++;
                boardGridArray[i] = { text: sym, isGold: isG, isJoker: false, isScatter: isScat };
            } else if (!boardGridArray[i].isJoker) {
                // Fill any empty cascade gaps dropped from previous clears
                let sym = symbols[Math.floor(Math.random() * symbols.length)];
                let isG = Math.random() < 0.15 && ['J','Q','K','A'].includes(sym);
                boardGridArray[i] = { text: sym, isGold: isG, isJoker: false, isScatter: false };
            }
        }

        // Draw structural UI onto DOM boards
        for(let i=0; i<20; i++) {
            const tile = document.getElementById(`tile_${i}`);
            const data = boardGridArray[i];
            tile.className = 'card-slot';
            tile.innerText = data.text;

            if(data.text === '♥️' || data.text === '♦️') tile.classList.add('red-suit');
            if(data.isGold) tile.classList.add('golden');
            if(data.isScatter) {
                tile.className = 'card-slot scatter';
                tile.innerHTML = '🪙<br>SCATTER';
            }
            if(data.isJoker) {
                tile.className = 'card-slot joker';
                tile.innerText = '🃏 JOKER';
            }
        }

        // --- 1,024 WAYS TO WIN ENGINE MATRIX ---
        // Build 5 columns arrays holding standard matching strings
        let columns = [[], [], [], [], []];
        for(let i=0; i<20; i++) {
            let colIndex = i % 5;
            columns[colIndex].push({ index: i, item: boardGridArray[i] });
        }

        let totalWinCredits = 0;
        let elementsToClear = new Set();

        // Check matching symbols starting from Column 1 across to Column 5 left-to-right
        columns[0].forEach(col1 => {
            let matchSymbol = col1.item.text;
            if(col1.item.isScatter || col1.item.isJoker) return;

            // Search matching counts inside contiguous sequential columns
            let col2Matches = columns[1].filter(c => c.item.text === matchSymbol || c.item.isJoker);
            if(col2Matches.length > 0) {
                let col3Matches = columns[2].filter(c => c.item.text === matchSymbol || c.item.isJoker);
                if(col3Matches.length > 0) {
                    // Match 3 verified successfully!
                    let pathCount = 1 * col2Matches.length * col3Matches.length;
                    
                    elementsToClear.add(col1.index);
                    col2Matches.forEach(c => elementsToClear.add(c.index));
                    col3Matches.forEach(c => elementsToClear.add(c.index));

                    // Look further if it extends to a Match 4 combination sequence
                    let col4Matches = columns[3].filter(c => c.item.text === matchSymbol || c.item.isJoker);
                    if(col4Matches.length > 0) {
                        pathCount *= col4Matches.length;
                        col4Matches.forEach(c => elementsToClear.add(c.index));

                        // Look further if it hits the maximum 5 Column Jackpot line
                        let col5Matches = columns[4].filter(c => c.item.text === matchSymbol || c.item.isJoker);
                        if(col5Matches.length > 0) {
                            pathCount *= col5Matches.length;
                            col5Matches.forEach(c => elementsToClear.add(c.index));
                            totalWinCredits += (250 * pathCount); // 5 Match pay calculations
                        } else {
                            totalWinCredits += (120 * pathCount); // 4 Match pay calculation
                        }
                    } else {
                        totalWinCredits += (50 * pathCount); // 3 Match base paths calculation
                    }
                }
            }
        });

        // Trigger the 10 Free Spins Bonus Game if 3 Scatters land anywhere
        if(scatterCounter >= 3 && !isFreeSpin) {
            triggerFreeSpinsBonus();
            return;
        }

        if(totalWinCredits > 0) {
            const targetScale = isFreeSpin ? freeMultiplierMap : normalMultiplierMap;
            let currentMultiplierValue = targetScale[comboMultiplierStep];
            let finalPayoutCalculated = totalWinCredits * currentMultiplierValue;

            balance += finalPayoutCalculated;
            document.getElementById('balance-display').innerText = balance;
            document.getElementById('win-status').innerText = `WIN: +${finalPayoutCalculated} Credits! (Ways paths found)`;

            // Golden Conversion to Wild Jokers loop
            elementsToClear.forEach(idx => {
                if(boardGridArray[idx].isGold) {
                    boardGridArray[idx].isGold = false;
                    boardGridArray[idx].isJoker = true; // Mutates to sticky Wildcard card
                } else if (!boardGridArray[idx].isJoker) {
                    // Instantly resets to standard layout state to prepare for cascading drop
                    boardGridArray[idx] = { text: '', isGold: false, isJoker: false, isScatter: false };
                }
            });

            // Climb up the progressive multiplier bar setup
            if(comboMultiplierStep < 3) comboMultiplierStep++;
            updateMultiplierDisplay();

            // Run cascading free consecutive chain loop drop after 1.3 seconds
            setTimeout(() => { runShuffleAnimation(); }, 1300);

        } else {
            // Cascade chain stopped or missed completely. Reset mechanics.
            document.getElementById('win-status').innerText = '';
            
            if(isFreeSpin && freeSpinsRemaining > 0) {
                freeSpinsRemaining--;
                document.getElementById('game-mode').innerText = `FREE SPINS: ${freeSpinsRemaining} LEFT`;
                
                if(freeSpinsRemaining === 0) {
                    isFreeSpin = false;
                    document.getElementById('game-mode').innerText = "MAIN GAME";
                    comboMultiplierStep = 0;
                }
                // Free rounds pull automatically
                setTimeout(() => { triggerMainSpin(); }, 1000);
            } else {
                // Standard manual spin release block
                boardGridArray = Array(20).fill(null).map(() => ({ text: 'A', isGold: false, isJoker: false, isScatter: false }));
                comboMultiplierStep = 0;
                updateMultiplierDisplay();
                document.getElementById('spin-btn').disabled = false;
            }
        }
    }

    function triggerFreeSpinsBonus() {
        alert("🎰 BONUS ACCESSED: 10 FREE SPINS GRANTED! 🎰");
        isFreeSpin = true;
        freeSpinsRemaining = 10;
        comboMultiplierStep = 0;
        document.getElementById('game-mode').innerText = `FREE SPINS: ${freeSpinsRemaining} LEFT`;
        updateMultiplierDisplay();
        setTimeout(() => { triggerMainSpin(); }, 1200);
    }
</script>
</body>
</html>
