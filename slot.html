<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Super Ace - JILI Gaming</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    body {
        background: #060d1a;
        background: radial-gradient(circle, #0e1e38 0%, #03070f 100%);
        font-family: 'Helvetica Neue', Arial, sans-serif;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        height: 100vh;
        overflow: hidden;
        user-select: none;
    }

    /* Top Header Bar */
    header {
        width: 100%;
        max-width: 450px;
        padding: 10px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
        z-index: 10;
    }
    .jili-badge {
        background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
        color: #000;
        font-weight: bold;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 3px;
        box-shadow: 0 0 5px rgba(255,215,0,0.5);
    }
    .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .user-tag {
        font-size: 12px;
        color: #aaa;
    }
    .logout-btn {
        background: #cc0000;
        color: white;
        border: none;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
    }

    /* Game Layout Wrapper */
    .game-container {
        width: 100%;
        max-width: 450px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0 10px;
    }

    /* Mode and Multiplier Banner */
    .mode-banner {
        font-size: 22px;
        font-weight: 900;
        color: #ff3300;
        text-shadow: 0 0 10px rgba(255,51,0,0.6);
        margin-bottom: 5px;
        letter-spacing: 1px;
    }
    .multiplier-bar {
        background: rgba(13, 3, 3, 0.85);
        border: 2px solid #6b1414;
        border-radius: 20px;
        display: flex;
        width: 90%;
        justify-content: space-around;
        padding: 4px 10px;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .mult-item {
        font-size: 18px;
        font-weight: bold;
        color: #551111;
    }
    .mult-item.active {
        color: #fffb00;
        text-shadow: 0 0 8px #ff6600;
        transform: scale(1.15);
    }

    /* Board Grid Customization */
    .slot-machine-board {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid #23395d;
        border-radius: 8px;
        padding: 4px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }
    .grid-5x4 {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 3px;
    }

    /* Authentic Card Appearance */
    .card-slot {
        height: 82px;
        background: linear-gradient(180deg, #fbfbfb 0%, #d9e2ec 100%);
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: 900;
        color: #102a43;
        box-shadow: inset 0 -3px 0 #bcccdc, 0 2px 4px rgba(0,0,0,0.4);
    }
    .card-slot.red-suit { color: #d32f2f; }
    .card-slot.golden {
        background: linear-gradient(135deg, #fff9db 0%, #f59f00 100%);
        box-shadow: 0 0 8px #f59f00;
        color: #fff;
        text-shadow: 1px 1px 2px #000;
    }
    .card-slot.scatter {
        background: radial-gradient(circle, #fff3bf 0%, #e67e22 100%);
        color: #fff;
        font-size: 10px;
        font-weight: bold;
        text-shadow: 1px 1px 2px #000;
        border: 2px solid #f1c40f;
    }
    .card-slot.joker {
        background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        color: #4a00e0;
        font-size: 12px;
    }

    /* Bottom Control Dashboard */
    .control-dashboard {
        width: 100%;
        max-width: 450px;
        background: #09111e;
        border-top: 2px solid #1c2d42;
        padding: 10px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .dash-left, .dash-right {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .info-label {
        font-size: 10px;
        color: #627d98;
        text-transform: uppercase;
    }
    .info-value {
        font-size: 15px;
        color: #fadb14;
        font-weight: bold;
    }
    .deposit-btn {
        background: #27ae60;
        color: white;
        border: none;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: bold;
        cursor: pointer;
    }

    /* Center Main Spin Button */
    .spin-container {
        position: relative;
    }
    .jili-spin-btn {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffe066 0%, #f59f00 100%);
        border: 3px solid #fff;
        color: #5c3e00;
        font-weight: 900;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(245,159,0,0.6);
    }
    .jili-spin-btn:disabled {
        background: #243b53;
        color: #486581;
        border-color: #334e68;
        box-shadow: none;
    }
    .win-ticker {
        text-align: center;
        color: #48bb78;
        font-weight: bold;
        font-size: 14px;
        margin: 5px 0;
        min-height: 18px;
    }
</style>
</head>
<body>

<header>
    <div class="jili-badge">JILI</div>
    <div class="header-right">
        <span class="user-tag" id="user-welcome">👤 Guest</span>
        <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
    </div>
</header>

<div class="game-container">
    <div class="mode-banner" id="game-mode">MAIN GAME</div>

    <div class="multiplier-bar">
        <div class="mult-item active" id="x_0">x1</div>
        <div class="mult-item" id="x_1">x2</div>
        <div class="mult-item" id="x_2">x3</div>
        <div class="mult-item" id="x_3">x5</div>
    </div>

    <div class="slot-machine-board">
        <div class="grid-5x4" id="board-matrix"></div>
    </div>

    <div class="win-ticker" id="win-status"></div>
</div>

<div class="control-dashboard">
    <div class="dash-left">
        <span class="info-label">Bet Setup</span>
        <span class="info-value">500.00</span>
    </div>
    
    <div class="spin-container">
        <button class="jili-spin-btn" id="spin-btn" onclick="triggerMainSpin()">JILI</button>
    </div>
    
    <div class="dash-right" style="text-align: right; align-items: flex-end;">
        <span class="info-label">Balance Credits</span>
        <span class="info-value" id="balance-display">0.00</span>
        <button class="deposit-btn" onclick="openDepositWindow()">💸 Deposit</button>
    </div>
</div>

<script>
    const symbols = ['J', 'Q', 'K', 'A', '♠️', '♥️', '♦️', '♣️'];
    const betCost = 500;
    
    let username = localStorage.getItem('currentUser') || 'Guest';
    let balance = parseInt(localStorage.getItem(`balance_${username}`)) || 0;
    
    let isFreeSpin = false;
    let freeSpinsRemaining = 0;
    let comboMultiplierStep = 0;
    
    const normalMultiplierMap = [1, 2, 3, 5];
    const freeMultiplierMap = [2, 4, 6, 10];
    let boardGridArray = Array(20).fill(null).map(() => ({ text: 'A', isGold: false, isJoker: false, isScatter: false }));

    function syncAccountData() {
        document.getElementById('user-welcome').innerText = `👤 ${username}`;
        document.getElementById('balance-display').innerText = balance.toLocaleString() + ".00";
    }

    function createEmptySlots() {
        const board = document.getElementById('board-matrix');
        board.innerHTML = '';
        for(let i=0; i<20; i++) {
            const slot = document.createElement('div');
            slot.className = 'card-slot';
            slot.id = `tile_${i}`;
            slot.innerText = 'A';
            board.appendChild(slot);
        }
        syncAccountData();
    }
    createEmptySlots();

    function saveBalance() {
        localStorage.setItem(`balance_${username}`, balance);
        document.getElementById('balance-display').innerText = balance.toLocaleString() + ".00";
    }

    function openDepositWindow() {
        let amount = prompt("Enter amount to deposit into PinoyJackpot:", "1000");
        let parsed = parseInt(amount);
        if(parsed > 0) {
            balance += parsed;
            saveBalance();
            alert(`Successfully added ${parsed} credits to your account!`);
        } else {
            alert("Invalid deposit amount.");
        }
    }

    function updateMultiplierDisplay() {
        const referenceScale = isFreeSpin ? freeMultiplierMap : normalMultiplierMap;
        for(let i=0; i<4; i++) {
            const el = document.getElementById(`x_${i}`);
            el.innerText = 'x' + referenceScale[i];
            el.className = (comboMultiplierStep === i) ? 'mult-item active' : 'mult-item';
        }
    }

    function triggerMainSpin() {
        if(!isFreeSpin && comboMultiplierStep === 0) {
            if(balance < betCost) { 
                alert("Insufficient Credits! Please click the Deposit button to add funds."); 
                return; 
            }
            balance -= betCost;
            saveBalance();
        }
        document.getElementById('spin-btn').disabled = true;
        updateMultiplierDisplay();
        runShuffleAnimation();
    }

    function runShuffleAnimation() {
        let shuffles = 0;
        const speedLoop = setInterval(() => {
            for(let i=0; i<20; i++) {
                if(boardGridArray[i]?.isJoker) continue;
                const tempSym = symbols[Math.floor(Math.random() * symbols.length)];
                const el = document.getElementById(`tile_${i}`);
                el.className = 'card-slot';
                el.innerText = tempSym;
                if(tempSym === '♥️' || tempSym === '♦️') el.classList.add('red-suit');
            }
            shuffles++;
            if(shuffles > 10) {
                clearInterval(speedLoop);
                processWaysToWinLogic();
            }
        }, 65);
    }

    function processWaysToWinLogic() {
        let scatterCounter = 0;
        for(let i=0; i<20; i++) {
            if(comboMultiplierStep === 0 && !isFreeSpin) {
                let sym = symbols[Math.floor(Math.random() * symbols.length)];
                let isScat = Math.random() < 0.05;
                let isG = !isScat && Math.random() < 0.25 && ['J','Q','K','A'].includes(sym);
                if(isScat) scatterCounter++;
                boardGridArray[i] = { text: sym, isGold: isG, isJoker: false, isScatter: isScat };
            } else if (!boardGridArray[i].isJoker) {
                let sym = symbols[Math.floor(Math.random() * symbols.length)];
                let isG = Math.random() < 0.15 && ['J','Q','K','A'].includes(sym);
                boardGridArray[i] = { text: sym, isGold: isG, isJoker: false, isScatter: false };
            }
        }

        for(let i=0; i<20; i++) {
            const tile = document.getElementById(`tile_${i}`);
            const data = boardGridArray[i];
            tile.className = 'card-slot';
            tile.innerText = data.text;
            if(data.text === '♥️' || data.text === '♦️') tile.classList.add('red-suit');
            if(data.isGold) tile.classList.add('golden');
            if(data.isScatter) {
                tile.className = 'card-slot scatter';
                tile.innerHTML = '🪙 SCATTER';
            }
            if(data.isJoker) {
                tile.className = 'card-slot joker';
                tile.innerText = '🃏 JOKER';
            }
        }

        let columns = [[], [], [], [], []];
        for(let i=0; i<20; i++) { columns[i % 5].push({ index: i, item: boardGridArray[i] }); }

        let totalWinCredits = 0;
        let elementsToClear = new Set();

        columns[0].forEach(col1 => {
            let matchSymbol = col1.item.text;
            if(col1.item.isScatter || col1.item.isJoker) return;
            let col2Matches = columns[1].filter(c => c.item.text === matchSymbol || c.item.isJoker);
            if(col2Matches.length > 0) {
                let col3Matches = columns[2].filter(c => c.item.text === matchSymbol || c.item.isJoker);
                if(col3Matches.length > 0) {
                    let pathCount = 1 * col2Matches.length * col3Matches.length;
                    elementsToClear.add(col1.index);
                    col2Matches.forEach(c => elementsToClear.add(c.index));
                    col3Matches.forEach(c => elementsToClear.add(c.index));

                    let col4Matches = columns[3].filter(c => c.item.text === matchSymbol || c.item.isJoker);
                    if(col4Matches.length > 0) {
                        pathCount *= col4Matches.length;
                        col4Matches.forEach(c => elementsToClear.add(c.index));
                        let col5Matches = columns[4].filter(c => c.item.text === matchSymbol || c.item.isJoker);
                        if(col5Matches.length > 0) {
                            pathCount *= col5Matches.length;
                            col5Matches.forEach(c => elementsToClear.add(c.index));
                            totalWinCredits += (250 * pathCount);
                        } else { totalWinCredits += (120 * pathCount); }
                    } else { totalWinCredits += (50 * pathCount); }
                }
            }
        });

        if(scatterCounter >= 3 && !isFreeSpin) {
            triggerFreeSpinsBonus();
            return;
        }

        if(totalWinCredits > 0) {
            const targetScale = isFreeSpin ? freeMultiplierMap : normalMultiplierMap;
            let finalPayoutCalculated = totalWinCredits * targetScale[comboMultiplierStep];
            balance += finalPayoutCalculated;
            saveBalance();
            document.getElementById('win-status').innerText = `WIN: ${finalPayoutCalculated.toLocaleString()}.00`;

            elementsToClear.forEach(idx => {
                if(boardGridArray[idx].isGold) {
                    boardGridArray[idx].isGold = false;
                    boardGridArray[idx].isJoker = true;
                } else if (!boardGridArray[idx].isJoker) {
                    boardGridArray[idx] = { text: '', isGold: false, isJoker: false, isScatter: false };
                }
            });

            if(comboMultiplierStep < 3) comboMultiplierStep++;
            updateMultiplierDisplay();
            setTimeout(() => { runShuffleAnimation(); }, 1300);
        } else {
            document.getElementById('win-status').innerText = '';
            if(isFreeSpin && freeSpinsRemaining > 0) {
                freeSpinsRemaining--;
                document.getElementById('game-mode').innerText = `FREE SPIN ${freeSpinsRemaining}`;
                if(freeSpinsRemaining === 0) {
                    isFreeSpin = false;
                    document.getElementById('game-mode').innerText = "MAIN GAME";
                    comboMultiplierStep = 0;
                }
                setTimeout(() => { triggerMainSpin(); }, 1000);
            } else {
                boardGridArray = Array(20).fill(null).map(() => ({ text: 'A', isGold: false, isJoker: false, isScatter: false }));
                comboMultiplierStep = 0;
                updateMultiplierDisplay();
                document.getElementById('spin-btn').disabled = false;
            }
        }
    }

    function triggerFreeSpinsBonus() {
        alert("🎰 BONUS ACCESSED: 10 FREE SPINS GRANTED! 🎰");
        isFreeSpin = true;
        freeSpinsRemaining = 10;
        comboMultiplierStep = 0;
        document.getElementById('game-mode').innerText = `FREE SPIN ${freeSpinsRemaining}`;
        updateMultiplierDisplay();
        setTimeout(() => { triggerMainSpin(); }, 1200);
    }

    function handleLogout() {
        localStorage.removeItem('currentUser');
        alert("You have been logged out successfully!");
        window.location.href = "index.html";
    }
</script>
</body>
</html>
