<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Ace - JILI Gaming</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    body {
        background: #0b0202;
        background: linear-gradient(180deg, #240505 0%, #0a0101 100%);
        font-family: 'Arial', sans-serif;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
    }
    header {
        width: 100%;
        padding: 10px 20px;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #4a0e0e;
    }
    .logo-text {
        color: #ffd700;
        font-weight: bold;
        font-size: 18px;
        letter-spacing: 1px;
    }
    .exit-btn {
        color: #fff;
        text-decoration: none;
        font-size: 12px;
        background: rgba(255,255,255,0.1);
        padding: 5px 10px;
        border-radius: 4px;
    }
    .game-container {
        width: 100%;
        max-width: 412px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-grow: 1;
        justify-content: center;
    }
    .mode-banner {
        color: #ff3333;
        font-size: 20px;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(255,0,0,0.5);
        margin-bottom: 5px;
        letter-spacing: 2px;
    }
    /* JILI Multiplier Bar */
    .multiplier-bar {
        background: #1a0202;
        border: 2px solid #8a1f1f;
        border-radius: 20px;
        display: flex;
        width: 100%;
        justify-content: space-around;
        padding: 6px 10px;
        margin-bottom: 10px;
        box-shadow: inset 0 0 10px #000;
    }
    .mult-item {
        font-size: 18px;
        font-weight: 900;
        color: #4a1515;
        transition: all 0.3s ease;
    }
    .mult-item.active {
        color: #fff;
        background: linear-gradient(180deg, #ff9900 0%, #ff3300 100%);
        padding: 0 15px;
        border-radius: 12px;
        box-shadow: 0 0 8px #ff6600;
        transform: scale(1.1);
    }
    /* 5x4 Reels Main Screen */
    .slot-machine-board {
        width: 100%;
        background: #141923;
        border: 4px solid #5a3d16;
        border-radius: 10px;
        padding: 6px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.9);
    }
    .grid-5x4 {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
    }
    .card-slot {
        height: 72px;
        background: #fff;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: bold;
        color: #000;
        box-shadow: inset 0 -3px 0 #ccc;
        position: relative;
    }
    .card-slot.red-suit { color: #cc0000; }
    .card-slot.black-suit { color: #111; }
    
    /* Golden State */
    .card-slot.golden {
        background: linear-gradient(135deg, #fff2a3 0%, #d4a326 100%);
        border: 2px solid #ffd700;
        box-shadow: 0 0 8px #ffd700;
        color: #fff;
        text-shadow: 1px 1px 2px #000;
    }
    /* Joker Wild */
    .card-slot.joker {
        background: linear-gradient(135deg, #b059ff 0%, #53129e 100%);
        border: 2px solid #d43fff;
        color: #ffd700;
        font-size: 12px;
        text-shadow: 0 0 4px #fff;
    }
    /* Scatter */
    .card-slot.scatter {
        background: radial-gradient(circle, #ffea6c 0%, #e65c00 100%);
        border: 2px solid #ffcc00;
        border-radius: 50%;
        color: #fff;
        font-size: 11px;
        text-shadow: 1px 1px 2px #000;
        text-align: center;
        line-height: 1.1;
    }
    /* Footer Dashboard Panel */
    .control-dashboard {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 15px;
        background: rgba(0,0,0,0.6);
        padding: 10px 15px;
        border-radius: 40px;
        border: 1px solid #3a1a1a;
    }
    .info-panel {
        display: flex;
        flex-direction: column;
    }
    .info-panel label {
        font-size: 10px;
        color: #aaa;
        text-transform: uppercase;
    }
    .info-panel span {
        font-size: 16px;
        color: #ffd700;
        font-weight: bold;
    }
    .jili-spin-btn {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ffe066 0%, #cc8800 100%);
        border: 3px solid #fff;
        color: #000;
        font-weight: 900;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(255,215,0,0.4);
    }
    .jili-spin-btn:disabled {
        background: #444;
        color: #888;
        border-color: #666;
        box-shadow: none;
    }
    .win-ticker {
        margin-top: 10px;
        font-size: 14px;
        color: #ffd700;
        font-weight: bold;
        min-height: 18px;
    }
</style>
</head>
<body>

<header>
    <div class="logo-text">JILI SUPER ACE</div>
    <a href="index.html" class="exit-btn">🏠 Home</a>
</header>

<div class="game-container">
    <div class="mode-banner" id="game-mode">MAIN GAME</div>

    <!-- Multipliers Header -->
    <div class="multiplier-bar">
        <div class="mult-item active" id="x_0">x1</div>
        <div class="mult-item" id="x_1">x2</div>
        <div class="mult-item" id="x_2">x3</div>
        <div class="mult-item" id="x_3">x5</div>
    </div>

    <!-- 5x4 Board Box Grid -->
    <div class="slot-machine-board">
        <div class="grid-5x4" id="board-matrix">
            <!-- 20 slots handled dynamically -->
        </div>
    </div>

    <div class="win-ticker" id="win-status"></div>

    <!-- Control Area -->
    <div class="control-dashboard">
        <div class="info-panel">
            <label>Bet</label>
            <span>500</span>
        </div>
        
        <button class="jili-spin-btn" id="spin-btn" onclick="startJiliSpin()">JILI</button>
        
        <div class="info-panel" style="text-align: right;">
            <label>Balance</label>
            <span id="balance-display">21115</span>
        </div>
    </div>
</div>

<script>
    const itemsPool = ['J', 'Q', 'K', 'A', '♠️', '♥️', '♦️', '♣️'];
    let userBalance = 21115;
    const betCost = 500;
    
    let isFreeSpin = false;
    let freeSpinsLeft = 0;
    let comboStep = 0;
    
    const normalMults = [1, 2, 3, 5];
    const freeMults = [2, 4, 6, 10];
    let currentBoard = [];

    function setupGrid() {
        const board = document.getElementById('board-matrix');
        board.innerHTML = '';
        for(let i=0; i<20; i++) {
            const slot = document.createElement('div');
            slot.className = 'card-slot black-suit';
            slot.id = `tile_${i}`;
            slot.innerText = 'A';
            board.appendChild(slot);
        }
    }
    setupGrid();

    function renderMultipliers() {
        const currentSet = isFreeSpin ? freeMults : normalMults;
        for(let i=0; i<4; i++) {
            const el = document.getElementById(`x_${i}`);
            el.innerText = 'x' + currentSet[i];
            el.className = (comboStep === i) ? 'mult-item active' : 'mult-item';
        }
    }

    function startJiliSpin() {
        if(!isFreeSpin) {
            if(userBalance < betCost) { alert("Insufficient Balance!"); return; }
            userBalance -= betCost;
            document.getElementById('balance-display').innerText = userBalance;
        }
        document.getElementById('spin-btn').disabled = true;
        if(!isFreeSpin) comboStep = 0;
        renderMultipliers();
        animateShuffle();
    }

    function animateShuffle() {
        let iterations = 0;
        const interval = setInterval(() => {
            for(let i=0; i<20; i++) {
                if(isFreeSpin && currentBoard[i]?.isJoker) continue;
                const item = itemsPool[Math.floor(Math.random() * itemsPool.length)];
                const el = document.getElementById(`tile_${i}`);
                el.className = 'card-slot';
                el.innerText = item;
                if(item === '♥️' || item === '♦️') el.classList.add('red-suit');
            }
            iterations++;
            if(iterations > 10) {
                clearInterval(interval);
                evaluateMatches();
            }
        }, 60);
    }

    function evaluateMatches() {
        currentBoard = [];
        let scatters = 0;
        
        for(let i=0; i<20; i++) {
            let val = itemsPool[Math.floor(Math.random() * itemsPool.length)];
            let gold = Math.random() < 0.20 && ['J','Q','K','A'].includes(val);
            let scat = Math.random() < 0.06;
            
            if(scat) scatters++;
            currentBoard.push({ text: val, isGold: gold, isJoker: false, isScatter: scat });
        }

        // Render styles onto cards
        for(let i=0; i<20; i++) {
            const el = document.getElementById(`tile_${i}`);
            const data = currentBoard[i];
            el.className = 'card-slot';
            el.innerText = data.text;

            if(data.text === '♥️' || data.text === '♦️') el.classList.add('red-suit');
            if(data.isGold) el.classList.add('golden');
            if(data.isScatter) {
                el.className = 'card-slot scatter';
                el.innerHTML = '🪙<br>SCATTER';
            }
        }

        // Check matching rows
        let winAmount = 0;
        let won = false;

        for(let r=0; r<4; r++) {
            let offset = r * 5;
            if(currentBoard[offset].text === currentBoard[offset+1].text && currentBoard[offset+1].text === currentBoard[offset+2].text) {
                won = true;
                winAmount += 400;
                if(currentBoard[offset].isGold) currentBoard[offset].isJoker = true;
                if(currentBoard[offset+1].isGold) currentBoard[offset+1].isJoker = true;
                if(currentBoard[offset+2].isGold) currentBoard[offset+2].isJoker = true;
            }
        }

        if(scatters >= 3 && !isFreeSpin) {
            triggerBonusRound();
            return;
        }

        if(won) {
            const mults = isFreeSpin ? freeMults : normalMults;
            let finalPayout = winAmount * mults[comboStep];
            userBalance += finalPayout;
            document.getElementById('balance-display').innerText = userBalance;
            document.getElementById('win-status').innerText = `WIN: ${finalPayout}!`;

            if(comboStep < 3) comboStep++;
            renderMultipliers();

            setTimeout(() => { animateShuffle(); }, 1200);
        } else {
            document.getElementById('win-status').innerText = '';
            if(isFreeSpin && freeSpinsLeft > 0) {
                freeSpinsLeft--;
                document.getElementById('game-mode').innerText = `FREE SPIN: ${freeSpinsLeft}`;
                if(freeSpinsLeft === 0) {
                    isFreeSpin = false;
                    document.getElementById('game-mode').innerText = "MAIN GAME";
                }
                setTimeout(() => { startJiliSpin(); }, 1000);
            } else {
                document.getElementById('spin-btn').disabled = false;
            }
        }
    }

    function triggerBonusRound() {
        isFreeSpin = true;
        freeSpinsLeft = 8;
        comboStep = 0;
        document.getElementById('game-mode').innerText = `FREE SPIN: ${freeSpinsLeft}`;
        renderMultipliers();
        setTimeout(() => { startJiliSpin(); }, 1000);
    }
</script>
</body>
</html>
