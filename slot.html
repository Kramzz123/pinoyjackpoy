<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinoyJackpot - Super Ace JILI</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: #050505;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,.15), transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(255,215,0,.12), transparent 35%),
    linear-gradient(#050505, #101010);
    z-index: -2;
}

header {
    width: 100%;
    background: rgba(0,0,0,.8);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    border-bottom: 2px solid gold;
    box-sizing: border-box;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 15px gold;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: .3s;
}

nav a:hover { color: #ffd700; }

.game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    box-sizing: border-box;
}

h1 {
    color: #ffd700;
    font-size: 36px;
    text-shadow: 0 0 15px gold;
    margin: 10px 0 0 0;
}

.sub-title {
    color: #ffae00;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 3px;
    margin-bottom: 15px;
}

/* JILI Multiplier Board */
.multiplier-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
    background: #111;
    padding: 8px 16px;
    border-radius: 30px;
    border: 1px solid gold;
}

.mult {
    font-weight: bold;
    font-size: 14px;
    padding: 4px 12px;
    border-radius: 15px;
    color: #444;
}

.mult.active {
    color: black;
    background: linear-gradient(90deg, #ffd700, #ffae00);
    box-shadow: 0 0 10px gold;
}

.balance-display {
    font-size: 22px;
    margin-bottom: 15px;
}
.balance-display span { color: #ffd700; font-weight: bold; }

/* 3x3 Cards Grid Setup */
.grid-container {
    background: #161616;
    border: 3px solid gold;
    border-radius: 20px;
    padding: 15px;
    box-shadow: 0 0 30px rgba(255,215,0,0.2);
    width: 100%;
    box-sizing: border-box;
}

.cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}

.card-slot {
    height: 100px;
    background: #fff;
    color: black;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    transition: all 0.2s ease;
    position: relative;
    border: 2px solid #ccc;
}

/* Golden Card State */
.card-slot.golden {
    background: linear-gradient(135deg, #ffe066, #f5b041);
    border: 2px solid gold;
    color: #fff;
    text-shadow: 1px 1px 3px black;
    box-shadow: 0 0 12px gold;
}

/* Joker / Wild Card State */
.card-slot.joker {
    background: linear-gradient(135deg, #9b59b6, #8e44ad);
    border: 2px solid #be2edd;
    color: gold;
    text-shadow: 0 0 8px white;
    box-shadow: 0 0 15px #be2edd;
    font-size: 22px;
}

.btn {
    padding: 15px;
    background: linear-gradient(90deg, #ffd700, #ffae00);
    color: black;
    font-weight: bold;
    font-size: 18px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 20px gold;
    width: 100%;
}
.btn:disabled { background: #444; color: #777; box-shadow: none; cursor: not-allowed; }

.message {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    min-height: 25px;
}
</style>
</head>
<body>

<header>
    <div class="logo">PinoyJackpot</div>
    <nav><a href="index.html">🏠 Home</a></nav>
</header>

<div class="game-container">
    <h1>SUPER ACE</h1>
    <div class="sub-title">JILI ARCADE SLOTS</div>

    <div class="multiplier-bar">
        <div class="mult active" id="m1">x1</div>
        <div class="mult" id="m2">x2</div>
        <div class="mult" id="m3">x3</div>
        <div class="mult" id="m5">x5</div>
    </div>

    <div class="balance-display">Credits: <span id="credits">1000</span></div>

    <div class="grid-container">
        <div class="cards-grid" id="board">
            <!-- 9 Cards will generate dynamically here via JavaScript -->
        </div>
        <button class="btn" id="spin-btn" onclick="triggerBetSpin()">SPIN (Cost: 10)</button>
    </div>

    <div class="message" id="msg">Golden Cards turn into JOKER Wilds on a match!</div>
</div>

<audio id="spin-sound" src="spin.mp3"></audio>
<audio id="win-sound" src="win.mp3"></audio>

<script>
const values = ['J', 'Q', 'K', 'A', '♠️', '♥️'];
let credits = 1000;
let multiplierIdx = 0;
const multTable = [1, 2, 3, 5];
let isComboSpin = false;

// Keeps track of board matrices
let currentBoardState = []; 

function buildEmptyBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    for(let i=0; i<9; i++) {
        const d = document.createElement('div');
        d.className = 'card-slot';
        d.id = `c_${i}`;
        d.innerText = '♣️';
        boardEl.appendChild(d);
    }
}
buildEmptyBoard();

function updateMultiplierUI() {
    for(let i=0; i<4; i++) {
        const id = ['m1','m2','m3','m5'][i];
        document.getElementById(id).className = (multiplierIdx === i) ? "mult active" : "mult";
    }
}

function triggerBetSpin() {
    if (credits < 10) {
        document.getElementById('msg').innerText = "Insufficient Credits!";
        return;
    }
    credits -= 10;
    document.getElementById('credits').innerText = credits;
    document.getElementById('spin-btn').disabled = true;
    
    multiplierIdx = 0;
    updateMultiplierUI();
    isComboSpin = false;
    
    runSuperAceSpin();
}

function runSuperAceSpin() {
    document.getElementById('spin-sound').currentTime = 0;
    document.getElementById('spin-sound').play().catch(()=>{});
    document.getElementById('msg').innerText = isComboSpin ? `Combo Spin! x${multTable[multiplierIdx]} active!` : "Shuffling Cards...";

    let shuffles = 0;
    const loop = setInterval(() => {
        for(let i=0; i<9; i++) {
            // Don't overwrite existing Joker wildcards if it's a cascading combo loop!
            if(isComboSpin && currentBoardState[i] && currentBoardState[i].isJoker) continue;

            const val = values[Math.floor(Math.random() * values.length)];
            const cardEl = document.getElementById(`c_${i}`);
            cardEl.innerText = val;
            cardEl.className = 'card-slot';
            cardEl.style.color = (val==='♥️') ? 'red' : 'black';
        }
        shuffles++;
        if(shuffles > 10) {
            clearInterval(loop);
            evaluateBoardLogic();
        }
    }, 60);
}

function evaluateBoardLogic() {
    // 1. Gather values
    if(!isComboSpin) {
        currentBoardState = [];
        for(let i=0; i<9; i++) {
            const val = document.getElementById(`c_${i}`).innerText;
            // 35% chance a regular card spawns as a JILI Golden Card
            const isGold = Math.random() < 0.35 && val !== '♥️' && val !== '♠️'; 
            currentBoardState.push({ text: val, isGold: isGold, isJoker: false });
        }
    }

    // Render exact styles onto the grid array
    for(let i=0; i<9; i++) {
        const el = document.getElementById(`c_${i}`);
        const data = currentBoardState[i];
        el.innerText = data.text;
        el.className = 'card-slot';
        el.style.color = (data.text === '♥️') ? 'red' : 'black';

        if(data.isGold) el.classList.add('golden');
        if(data.isJoker) {
            el.classList.add('joker');
            el.innerText = '🃏 JOKER';
            el.style.color = 'gold';
        }
    }

    // 2. Scan lines for matches (Row 1, Row 2, Row 3)
    let totalWin = 0;
    let matchedIndexes = new Set();

    const checkLine = (idx1, idx2, idx3) => {
        const c1 = currentBoardState[idx1];
        const c2 = currentBoardState[idx2];
        const c3 = currentBoardState[idx3];

        // Match check supporting Jokers as Wildcards
        const v1 = c1.text; const v2 = c2.text; const v3 = c3.text;
        const w1 = c1.isJoker; const w2 = c2.isJoker; const w3 = c3.isJoker;

        let match = false;
        if ((v1===v2 || w1 || w2) && (v2===v3 || w2 || w3) && (v1===v3 || w1 || w3)) {
            match = true;
        }

        if(match) {
            matchedIndexes.add(idx1);
            matchedIndexes.add(idx2);
            matchedIndexes.add(idx3);
            totalWin += 20; // base win credits per match line
        }
    };

    checkLine(0, 1, 2); // Row 1
    checkLine(3, 4, 5); // Row 2
    checkLine(6, 7, 8); // Row 3

    if(totalWin > 0) {
        // Apply multiplier factor
        let finalPayout = totalWin * multTable[multiplierIdx];
        credits += finalPayout;
        document.getElementById('credits').innerText = credits;

        document.getElementById('win-sound').currentTime = 0;
        document.getElementById('win-sound').play().catch(()=>{});
        document.getElementById('msg').innerHTML = `<span style="color:#00ff00;">Match Line! Won ${finalPayout} Credits!</span>`;

        // Golden Card conversion loop to Jokers
        matchedIndexes.forEach(idx => {
            if(currentBoardState[idx].isGold) {
                currentBoardState[idx].isGold = false;
                currentBoardState[idx].isJoker = true; // Flips to persistent Wild!
            } else if (!currentBoardState[idx].isJoker) {
                // Regular cards clear out completely to drop new randoms
                currentBoardState[idx] = { text: '♣️', isGold: false, isJoker: false };
            }
        });

        // Level up the multiplier ceiling
        if(multiplierIdx < 3) multiplierIdx++;
        updateMultiplierUI();
        isComboSpin = true;

        // Auto-trigger the cascading elimination free match spin
        setTimeout(() => {
            runSuperAceSpin();
        }, 1500);

    } else {
        // No match resets system completely back to basic operational configurations
        document.getElementById('msg').innerText = "No matches. Spin again!";
        multiplierIdx = 0;
        updateMultiplierUI();
        
        // Remove old Jokers for the next clean user bet pull
        for(let i=0; i<9; i++) {
            if(currentBoardState[i]) currentBoardState[i].isJoker = false;
        }
        
        document.getElementById('spin-btn').disabled = false;
    }
}
</script>

</body>
</html>
