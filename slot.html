<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinoyJackpot - Super Ace Slot</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #050505;
    color: white;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,.15), transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(255,215,0,.12), transparent 35%),
    linear-gradient(#050505, #101010);
    z-index: -2;
}

header {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,.8);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 30px;
    border-bottom: 2px solid gold;
    z-index: 10;
}

.logo {
    font-size: 32px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 15px gold;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
    transition: .3s;
}

nav a:hover {
    color: #ffd700;
    text-shadow: 0 0 10px gold;
}

.game-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 30px 20px;
}

h1 {
    color: #ffd700;
    font-size: 42px;
    text-shadow: 0 0 20px gold;
    margin-bottom: 5px;
    text-align: center;
}

.sub-title {
    color: #ffae00;
    font-weight: bold;
    letter-spacing: 2px;
    margin-bottom: 20px;
}

/* Multiplier Dashboard bar */
.multiplier-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    background: #111;
    padding: 10px 20px;
    border-radius: 30px;
    border: 1px solid gold;
}

.mult {
    font-weight: bold;
    padding: 5px 15px;
    border-radius: 20px;
    color: #555;
    transition: 0.3s;
}

.mult.active {
    color: black;
    background: linear-gradient(90deg, #ffd700, #ffae00);
    box-shadow: 0 0 15px gold;
    transform: scale(1.1);
}

.balance-display {
    font-size: 24px;
    color: #fff;
    margin-bottom: 20px;
}

.balance-display span {
    color: #ffd700;
    font-weight: bold;
}

.slot-machine {
    background: #111;
    border: 4px solid gold;
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(255,215,0,0.3);
    text-align: center;
    max-width: 450px;
    width: 100%;
    box-sizing: border-box;
}

.reels {
    display: flex;
    justify-content: space-between;
    background: #000;
    border: 2px solid #444;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 30px;
}

.reel {
    width: 90px;
    height: 120px;
    background: #fff; /* White background like a real card */
    color: black;
    border: 3px solid gold;
    border-radius: 12px;
    font-size: 45px;
    line-height: 120px;
    text-align: center;
    font-weight: bold;
    user-select: none;
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
}

.btn {
    display: inline-block;
    padding: 18px 50px;
    background: linear-gradient(90deg, #ffd700, #ffae00);
    color: black;
    text-decoration: none;
    font-weight: bold;
    font-size: 20px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: .3s;
    box-shadow: 0 0 25px gold;
    width: 100%;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 45px gold;
}

.btn:disabled {
    background: #555;
    color: #888;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
}

.message {
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
    min-height: 30px;
}

.win-message {
    color: #00ff00;
    text-shadow: 0 0 15px #00ff00;
}

footer {
    background: #111;
    text-align: center;
    padding: 20px;
    border-top: 2px solid gold;
    color: #aaa;
    margin-top: auto;
}
</style>
</head>
<body>

<header>
    <div class="logo">PinoyJackpot</div>
    <nav>
        <a href="index.html">🏠 Home</a>
    </nav>
</header>

<div class="game-container">
    <h1>SUPER ACE</h1>
    <div class="sub-title">JILI CASINO EDITION</div>

    <!-- JILI Style Multiplier Display -->
    <div class="multiplier-bar">
        <div class="mult active" id="m1">x1</div>
        <div class="mult" id="m2">x2</div>
        <div class="mult" id="m3">x3</div>
        <div class="mult" id="m5">x5</div>
    </div>

    <div class="balance-display">Credits: <span id="balance">1000</span></div>

    <div class="slot-machine">
        <div class="reels">
            <div class="reel" id="reel1" style="color: red;">♦️</div>
            <div class="reel" id="reel2" style="color: gold; background: #222; text-shadow: 0 0 10px gold;">A</div>
            <div class="reel" id="reel3" style="color: black;">♠️</div>
        </div>

        <button class="btn" id="spin-btn" onclick="startSpin()">SPIN (Cost: 10)</button>
        <div class="message" id="msg">Match symbols to trigger Multipliers!</div>
    </div>
</div>

<footer>
    <p>&copy; 2026 PinoyJackpot. All rights reserved.</p>
</footer>

<audio id="spin-sound" src="spin.mp3"></audio>
<audio id="win-sound" src="win.mp3"></audio>

<script>
// Card symbols: J, Q, K, A, and Suits
const symbols = [
    { text: '♣️', color: 'black', bg: '#fff' },
    { text: '♦️', color: 'red', bg: '#fff' },
    { text: '♥️', color: 'red', bg: '#fff' },
    { text: '♠️', color: 'black', bg: '#fff' },
    { text: 'J', color: '#b8860b', bg: '#fff' },
    { text: 'Q', color: '#bd33a4', bg: '#fff' },
    { text: 'K', color: '#00563b', bg: '#fff' },
    { text: 'A', color: 'gold', bg: '#111' } // Golden Ace!
];

let balance = 1000;
const spinCost = 10;
let currentMultiplierIndex = 0; 
const multipliers = [1, 2, 3, 5];

const spinBtn = document.getElementById('spin-btn');
const balanceDisplay = document.getElementById('balance');
const msgDisplay = document.getElementById('msg');
const spinSound = document.getElementById('spin-sound');
const winSound = document.getElementById('win-sound');

function updateMultiplierUI() {
    document.getElementById('m1').className = currentMultiplierIndex === 0 ? "mult active" : "mult";
    document.getElementById('m2').className = currentMultiplierIndex === 1 ? "mult active" : "mult";
    document.getElementById('m3').className = currentMultiplierIndex === 2 ? "mult active" : "mult";
    document.getElementById('m5').className = currentMultiplierIndex === 3 ? "mult active" : "mult";
}

function applyCardStyle(reelElement, symbolObj) {
    reelElement.innerText = symbolObj.text;
    reelElement.style.color = symbolObj.color;
    reelElement.style.background = symbolObj.bg;
    if(symbolObj.text === 'A') {
        reelElement.style.textShadow = "0 0 10px gold";
    } else {
        reelElement.style.textShadow = "none";
    }
}

function getRandomSymbol() {
    return symbols[Math.floor(Math.random() * symbols.length)];
}

function startSpin() {
    if (balance < spinCost) {
        msgDisplay.className = "message";
        msgDisplay.innerText = "Insufficient Credits!";
        return;
    }

    balance -= spinCost;
    balanceDisplay.innerText = balance;
    spinBtn.disabled = true;
    
    // Reset combo multipliers back to x1 on a brand new fresh bet spin
    currentMultiplierIndex = 0;
    updateMultiplierUI();

    runReelAnimation();
}

function runReelAnimation() {
    msgDisplay.className = "message";
    msgDisplay.innerText = currentMultiplierIndex > 0 ? `Combo Spin! x${multipliers[currentMultiplierIndex]} active!` : "Spinning...";

    spinSound.currentTime = 0;
    spinSound.play().catch(()=>{});

    let count = 0;
    const interval = setInterval(() => {
        applyCardStyle(document.getElementById('reel1'), getRandomSymbol());
        applyCardStyle(document.getElementById('reel2'), getRandomSymbol());
        applyCardStyle(document.getElementById('reel3'), getRandomSymbol());
        count++;
        
        if (count > 12) {
            clearInterval(interval);
            checkResults();
        }
    }, 70);
}

function checkResults() {
    const s1 = getRandomSymbol();
    const s2 = getRandomSymbol();
    const s3 = getRandomSymbol();

    const r1 = document.getElementById('reel1');
    const r2 = document.getElementById('reel2');
    const r3 = document.getElementById('reel3');

    applyCardStyle(r1, s1);
    applyCardStyle(r2, s2);
    applyCardStyle(r3, s3);

    let baseWin = 0;
    let isWin = false;

    // Winning logic calculations
    if (s1.text === s2.text && s2.text === s3.text) {
        // Match 3 Jackpot
        baseWin = s1.text === 'A' ? 100 : 50; 
        isWin = true;
    } else if (s1.text === s2.text || s2.text === s3.text || s1.text === s3.text) {
        // Match 2 Combo
        baseWin = 15;
        isWin = true;
    }

    if (isWin) {
        // Apply JILI Multiplier mechanics
        const activeMultiplier = multipliers[currentMultiplierIndex];
        const totalPayout = baseWin * activeMultiplier;
        balance += totalPayout;
        balanceDisplay.innerText = balance;

        winSound.currentTime = 0;
        winSound.play().catch(()=>{});

        msgDisplay.innerHTML = `🎉 WIN! Base ${baseWin} x${activeMultiplier} = <span style="color:gold;">${totalPayout} Credits</span>!`;
        msgDisplay.className = "message win-message";

        // Up the multiplier index step for cascading win combo
        if (currentMultiplierIndex < 3) {
            currentMultiplierIndex++;
        }
        updateMultiplierUI();

        // Trigger Cascading Drop Free Spin after 1.5 seconds!
        setTimeout(() => {
            runReelAnimation();
        }, 1600);

    } else {
        // No match resets everything
        msgDisplay.className = "message";
        msgDisplay.innerText = "No match. Better luck next spin!";
        currentMultiplierIndex = 0;
        updateMultiplierUI();
        spinBtn.disabled = false;
    }
}
</script>
</body>
</html>
