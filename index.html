<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinoyJackpot</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#050505;
    color:white;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,.15), transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(255,215,0,.12), transparent 35%),
    linear-gradient(#050505,#101010);
    animation:bgmove 12s linear infinite alternate;
    z-index:-2;
}

@keyframes bgmove{
    from{transform:scale(1);}
    to{transform:scale(1.08);}
}

header{
    position:sticky;
    top:0;
    background:rgba(0,0,0,.8);
    backdrop-filter:blur(12px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 30px;
    border-bottom:2px solid gold;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#ffd700;
    text-shadow:0 0 15px gold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
    transition:.3s;
}

nav a:hover{
    color:#ffd700;
    text-shadow:0 0 10px gold;
}

.hero{
    min-height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:72px;
    color:#ffd700;
    text-shadow:
        0 0 10px gold,
        0 0 30px gold,
        0 0 60px gold;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{
        text-shadow:
        0 0 10px gold,
        0 0 30px gold;
    }
    50%{
        text-shadow:
        0 0 20px gold,
        0 0 60px gold,
        0 0 90px gold;
    }
}

.hero p{
font-size:20px;
color:#ddd;
margin-bottom:35px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:18px 45px;
    background:linear-gradient(90deg,#ffd700,#ffae00);
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:50px;
    transition:.3s;
    box-shadow:0 0 25px gold;
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 45px gold;
}


.features{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:60px 20px;
}

.card{
background:#181818;
width:280px;
padding:30px;
border-radius:15px;
border:1px solid gold;
text-align:center;
}

.card h2{
color:gold;
margin-bottom:15px;
}

footer{
background:#111;
text-align:center;
padding:30px;
border-top:2px solid gold;
color:#aaa;
}
</style>

</head>

<body>

<header>

<div class="logo">
PinoyJackpot
</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Games</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Welcome to PinoyJackpot</h1>

<p>
A premium black and gold website design.
</p>

<a href="#" class="btn">
Learn More
</a>

<p>Looks great on desktop, tablet and mobile.</p>
</div>

<div class="card">
<h2>Fast Loading</h2>
<p>Optimized for a smooth and responsive experience.</p>
</div>

</section>

<section class="games">

<h2>Featured Games</h2>

<div class="game-grid">

<div class="game-card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=600" alt="Arcade Game">
<h3>Arcade</h3>
</div>

<div class="game-card">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=600" alt="Action Game">
<h3>Action</h3>
</div>

<div class="game-card">
<img src="https://images.unsplash.com/photo-1511882150382-421056c89033?w=600" alt="Puzzle Game">
<h3>Puzzle</h3>
</div>

</div>

</section>

</body>
</html>
